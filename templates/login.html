<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Health Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="page-center">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-logo">H+</div>
            <h1>AI Health Assistant</h1>
            <p>Smart symptom guidance and medical report insights in one professional healthcare platform.</p>
        </div>

        <div class="form-title">Welcome Back</div>

        {% if message %}
            <div class="message-box">{{ message }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input class="form-input" type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button class="btn-primary" type="submit">Login</button>
        </form>

        <div class="auth-footer">
            Don’t have an account? <a href="/signup">Create one</a>
        </div>
    </div>
</div>

</body>
</html>
